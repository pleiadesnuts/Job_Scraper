name: ZipRecruiter Watcher

on:
  # JobSpy-backed ZipRecruiter pass, offset from LinkedIn/Indeed/Glassdoor.
  schedule:
    - cron: "27 16-23,0-3 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "One-time backfill: fetch last 30 days instead of last 24h (run once when setting up)"
        required: false
        type: boolean
        default: false

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: ZipRecruiter scrape
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install JobSpy deps
        run: pip install -r requirements.txt

      - name: Scrape ZipRecruiter
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python scrape_jobs.py --ziprecruiter-backfill
          else
            python scrape_jobs.py --ziprecruiter-only
          fi
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          NOTIFY_MIN_FIT: ${{ vars.NOTIFY_MIN_FIT }}

      - name: Record workflow run
        run: |
          python - <<'EOF'
          import json
          import os
          from datetime import datetime, timezone

          with open("output/ziprecruiter_jobs.json", encoding="utf-8") as f:
              data = json.load(f)

          entry = {
              "workflow": "ziprecruiter",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "job_count": int(data.get("total", 0)),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }

          with open("output/workflow_runs.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(entry, sort_keys=True) + "\n")
          EOF

      - name: Commit results to repo
        if: vars.ENABLE_DATA_COMMITS == 'true'
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add -f output/ziprecruiter_jobs.json output/ziprecruiter_jobs.md output/ziprecruiter_jobs.html output/workflow_runs.jsonl output/all_jobs.json output/notified.json
          git diff --cached --quiet || git commit -m "chore: update ziprecruiter listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase -X ours origin main
          git push
